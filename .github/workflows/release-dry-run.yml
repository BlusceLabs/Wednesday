name: release-dry-run
on:
  workflow_dispatch:
  pull_request:
    paths:
      - scripts/package-release.sh
      - .github/workflows/release*.yml
      - package.json
permissions:
  contents: read
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.11" }
      - run: bun install
      - run: bun run check
      - run: bun test
      - run: python3 -m py_compile python/bridge.py
      - run: bash scripts/package-release.sh
      - run: cd dist && sha256sum --check SHA256SUMS && unzip -t wednesday-*.zip && tar -tzf wednesday-*.tar.gz >/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: wednesday-release-dry-run
          path: dist/
          if-no-files-found: error
