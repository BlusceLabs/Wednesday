name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
  id-token: write
  attestations: write
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.11" }
      - name: Verify tag
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "v$VERSION"
      - run: bun install
      - run: bun run check
      - run: bun test
      - run: python3 -m py_compile python/bridge.py
      - run: bash scripts/package-release.sh
      - name: Verify archives
        run: |
          cd dist
          sha256sum --check SHA256SUMS
          unzip -t "wednesday-${GITHUB_REF_NAME#v}.zip"
          tar -tzf "wednesday-${GITHUB_REF_NAME#v}.tar.gz" >/dev/null
      - uses: actions/upload-artifact@v7
        with:
          name: wednesday-${{ github.ref_name }}
          path: |
            dist/wednesday-*.zip
            dist/wednesday-*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/wednesday-*.zip
            dist/wednesday-*.tar.gz
      - name: Publish GitHub release
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FLAGS=()
          [[ "$VERSION" == *-* ]] && FLAGS+=(--prerelease)
          gh release create "$GITHUB_REF_NAME" dist/wednesday-*.zip dist/wednesday-*.tar.gz dist/SHA256SUMS --verify-tag --generate-notes --title "Wednesday $VERSION" "${FLAGS[@]}"
