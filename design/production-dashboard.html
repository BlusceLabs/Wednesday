<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wednesday</title>
<style>
:root{--bg:#090d14;--panel:#111722;--line:#243047;--text:#edf2ff;--muted:#8995aa;--blue:#77a7ff;--mint:#63d6b0;--amber:#f2b66d}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 80% -10%,#182848 0,transparent 35%),var(--bg);color:var(--text);font:14px Inter,ui-sans-serif,system-ui;min-height:100vh}.shell{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.side{border-right:1px solid var(--line);padding:28px 20px;background:#0c111acc}.brand{font:700 21px Georgia,serif;letter-spacing:.3px}.brand i{color:var(--blue);font-style:normal}.sub{color:var(--muted);margin:5px 0 34px}.nav{display:grid;gap:8px}.nav button{background:transparent;color:var(--muted);border:0;text-align:left;padding:11px 12px;border-radius:9px;cursor:pointer}.nav button.active,.nav button:hover{background:#182132;color:var(--text)}.sidefoot{position:fixed;bottom:24px;width:208px}.token{width:100%;background:#0a0f17;border:1px solid var(--line);color:var(--text);padding:10px;border-radius:8px}.main{padding:28px;max-width:1440px;width:100%;margin:auto}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.top h1{font-size:25px;margin:0}.status{color:var(--mint);display:flex;align-items:center;gap:8px}.dot{width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 14px currentColor}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.card{background:linear-gradient(145deg,#131b28,#0f151f);border:1px solid var(--line);border-radius:14px;padding:18px}.metric{font-size:27px;font-weight:750;margin-top:8px}.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.1em}.grid{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(300px,.75fr);gap:18px}.chat{height:570px;display:flex;flex-direction:column}.messages{flex:1;overflow:auto;padding:4px}.msg{max-width:80%;padding:12px 14px;margin:10px 0;border-radius:11px;line-height:1.5;white-space:pre-wrap}.msg.you{margin-left:auto;background:#1b3153}.msg.wed{background:#182132;border:1px solid #26344b}.composer{display:flex;gap:10px;border-top:1px solid var(--line);padding-top:14px}.composer input{flex:1;background:#0b111a;border:1px solid var(--line);border-radius:10px;padding:13px;color:var(--text)}button.send{border:0;border-radius:10px;background:var(--blue);color:#07101f;font-weight:700;padding:0 20px;cursor:pointer}.tools{height:570px;overflow:auto}.toolhead{display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#121924;padding-bottom:12px}.search{width:100%;background:#0b111a;border:1px solid var(--line);border-radius:9px;padding:10px;color:var(--text);margin:10px 0 12px}.tool{display:flex;justify-content:space-between;gap:10px;border-top:1px solid #1e293b;padding:11px 2px}.tool small{color:var(--muted)}.pill{font-size:10px;padding:4px 7px;border-radius:20px;background:#1b2b43;color:var(--blue);height:max-content}.pill.approval{color:var(--amber);background:#34271c}.approvalmodal{position:fixed;inset:0;background:#05070bcc;display:grid;place-items:center;z-index:10}.approvalmodal[hidden]{display:none}.approvalbox{width:min(560px,calc(100% - 32px));background:#121a27;border:1px solid var(--amber);border-radius:16px;padding:22px;box-shadow:0 30px 90px #000}.approvalargs{background:#090e16;border-radius:9px;padding:12px;color:var(--muted);white-space:pre-wrap;max-height:180px;overflow:auto}.actions{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}.deny,.allow{border:0;border-radius:9px;padding:10px 16px;font-weight:700;cursor:pointer}.deny{background:#293244;color:var(--text)}.allow{background:var(--amber);color:#211506}@media(max-width:900px){.shell{grid-template-columns:1fr}.side{display:none}.main{padding:18px}.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.tools{height:430px}}
</style></head><body><div class="shell"><aside class="side"><div class="brand"><i>W</i>ednesday</div><div class="sub">Personal agent console</div><div class="nav"><button class="active">Overview</button><button onclick="document.querySelector('.tools').scrollIntoView()">Tool registry</button><button onclick="clearSession()">Clear session</button></div><div class="sidefoot"><div class="label" style="margin-bottom:8px">Bearer token</div><input id="token" class="token" type="password" placeholder="Localhost: optional"></div></aside><main class="main"><div class="top"><div><h1>Good to see you.</h1><div class="sub" style="margin:5px 0 0">Wednesday is ready to work.</div></div><div class="status"><span class="dot"></span><span id="health">connecting</span></div></div><section class="stats"><div class="card"><div class="label">Available tools</div><div class="metric" id="toolCount">—</div></div><div class="card"><div class="label">Tool groups</div><div class="metric" id="groupCount">—</div></div><div class="card"><div class="label">Session messages</div><div class="metric" id="messageCount">—</div></div><div class="card"><div class="label">Safety</div><div class="metric" style="color:var(--mint)">Active</div></div></section><section class="grid"><div class="card chat"><div class="label">Conversation</div><div id="messages" class="messages"><div class="msg wed">Hello. I’m Wednesday. What are we building?</div></div><form class="composer" id="chat"><input id="prompt" autocomplete="off" placeholder="Ask Wednesday anything…"><button class="send">Send</button></form></div><div class="card tools"><div class="toolhead"><div><div class="label">Tool registry</div><strong id="toolTitle">Loading…</strong></div></div><input id="search" class="search" placeholder="Filter tools"><div id="toolList"></div></div></section></main></div><div id="approvalModal" class="approvalmodal" hidden><div class="approvalbox"><div class="label">Approval required</div><h2 id="approvalSummary">Review action</h2><pre id="approvalArgs" class="approvalargs"></pre><div class="actions"><button class="deny" onclick="decide(false)">Deny</button><button class="allow" onclick="decide(true)">Allow once</button></div></div></div>
<script>let calls=0;window.fetch=async(path,opts={})=>({ok:true,json:async()=>path==='/health'?{status:'ready'}:path==='/v1/tools'?{total:82,tools:[{name:'browser_use',category:'browser',approval:true},{name:'cloakbrowser_use',category:'cloakbrowser',approval:true},{name:'scrapling_extract',category:'scrapling',approval:true},{name:'memory_search',category:'memory',approval:false},{name:'workspace_read',category:'workspace',approval:false}]}:path==='/v1/session'?{messages:24}:path==='/v1/approvals'?{approvals:[{id:'demo',summary:'cloakbrowser_use: https://example.com',args:{url:'https://example.com',backend:'cloak'}}]}:{}});</script><script>
const token=document.querySelector('#token');token.value=localStorage.wednesdayToken||'';token.onchange=()=>localStorage.wednesdayToken=token.value;const auth=()=>token.value?{Authorization:'Bearer '+token.value}:{};let tools=[];
async function api(path,options={}){const response=await fetch(path,{...options,headers:{...auth(),...(options.headers||{})}});const data=await response.json();if(!response.ok)throw Error(data.error||response.statusText);return data}
function message(text,role){const el=document.createElement('div');el.className='msg '+role;el.textContent=text;document.querySelector('#messages').append(el);el.scrollIntoView({behavior:'smooth'})}
function renderTools(query=''){const list=document.querySelector('#toolList');list.innerHTML='';tools.filter(t=>(t.name+' '+t.category).includes(query.toLowerCase())).forEach(t=>{const row=document.createElement('div');row.className='tool';row.innerHTML='<div><strong>'+t.name+'</strong><br><small>'+t.category+' capability</small></div><span class="pill '+(t.approval?'approval':'')+'">'+(t.approval?'approval':'ready')+'</span>';list.append(row)})}
let pendingApproval=null;async function pollApprovals(){try{const data=await api('/v1/approvals');pendingApproval=data.approvals[0]||null;const modal=document.querySelector('#approvalModal');modal.hidden=!pendingApproval;if(pendingApproval){document.querySelector('#approvalSummary').textContent=pendingApproval.summary;document.querySelector('#approvalArgs').textContent=JSON.stringify(pendingApproval.args,null,2)}}catch{}setTimeout(pollApprovals,750)}async function decide(allowed){if(!pendingApproval)return;await api('/v1/approvals/'+encodeURIComponent(pendingApproval.id),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({allowed})});pendingApproval=null;document.querySelector('#approvalModal').hidden=true}async function load(){try{const health=await api('/health');document.querySelector('#health').textContent=health.status;const info=await api('/v1/tools');tools=info.tools;document.querySelector('#toolCount').textContent=info.total;document.querySelector('#groupCount').textContent=new Set(tools.map(t=>t.category)).size;document.querySelector('#toolTitle').textContent=info.total+' capabilities';renderTools();const session=await api('/v1/session');document.querySelector('#messageCount').textContent=session.messages}catch(e){document.querySelector('#health').textContent=e.message}}
document.querySelector('#search').oninput=e=>renderTools(e.target.value);document.querySelector('#chat').onsubmit=async e=>{e.preventDefault();const input=document.querySelector('#prompt'),prompt=input.value.trim();if(!prompt)return;input.value='';message(prompt,'you');try{const out=await api('/v1/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});message(out.response||'(no text)','wed');document.querySelector('#messageCount').textContent=out.session.messages}catch(err){message('Error: '+err.message,'wed')}};async function clearSession(){try{await api('/v1/session',{method:'DELETE'});document.querySelector('#messageCount').textContent='0';message('Session cleared. Durable memories remain.','wed')}catch(e){message('Error: '+e.message,'wed')}}load();pollApprovals();
</script></body></html>
